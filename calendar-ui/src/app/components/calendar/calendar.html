<section class="calendar">
    <header class="calendar__header">
        <div class="calendar__heading">
            <span class="calendar__label">{{ title() }}</span>
        </div>

        <div class="calendar__actions">
            <div class="calendar__view-toggle">
                @for (view of views; track view.key) {
                <button
                    type="button"
                    class="calendar__view-button"
                    [class.calendar__view-button--active]="selectedView() === view.key"
                    (click)="setView(view.key)"
                >
                    {{ view.label }}
                </button>
                }
            </div>

            <div class="calendar__nav-group">
                <button type="button" class="calendar__icon-button" (click)="prev()" aria-label="Previous">&lsaquo;</button>
                <button type="button" class="calendar__today-button" (click)="gotoToday()">Today</button>
                <button type="button" class="calendar__icon-button" (click)="next()" aria-label="Next">&rsaquo;</button>
            </div>
        </div>
    </header>

    <div class="calendar__week-row">
        <div class="calendar__week-icon">
            <img src="/assets/icons/date-large.svg" alt="Date icon" width="32" height="32" />
        </div>

        <div class="calendar__date-pills">
            @if (selectedView() === 'day') {
            <button type="button" class="calendar__date-pill calendar__date-pill--selected">
                <span class="calendar__day-name">{{ weekdayLabel(activeDate()) }}</span>
                <span class="calendar__day-number">{{ activeDate().getDate() }}</span>
            </button>
            } @else if (selectedView() === 'week') {
            @for (day of weekDates(); track $index) {
            <button
                type="button"
                class="calendar__date-pill"
                [class.calendar__date-pill--selected]="isSelected(day)"
                (click)="selectDate(day)"
            >
                <span class="calendar__day-name">{{ weekdayLabel(day) }}</span>
                <span class="calendar__day-number">{{ day.getDate() }}</span>
            </button>
            }
            } @else {
            <span class="calendar__month-label">{{ title() }}</span>
            }
        </div>
    </div>

    <app-calendar-grid
        [events]="events()"
        [weekDates]="weekDates()"
        [selectedSlot]="selectedSlot()"
        [selectedView]="selectedView()"
        [activeDate]="activeDate()"
        (slotSelected)="onSlotSelected($event)"
        (viewRequested)="onViewRequested($event)"
    ></app-calendar-grid>

    <app-event-modal
        [open]="isModalOpen()"
        [value]="modalValue()"
        [selectedSlot]="selectedSlot()"
        (closed)="closeModal()"
        (saved)="saveEvent($event)"
    ></app-event-modal>
</section>
